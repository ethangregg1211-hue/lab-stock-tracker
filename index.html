<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Lab Stock Tracker - Manage your lab inventory" />
  <title>Lab Stock Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header>
    <h1>Lab Stock Tracker</h1>
    <button id="exportBtn">Export Excel</button>
  </header>

  <main>
    <section id="scanSection">
      <button id="scanBtn">Scan Item</button>
      <video id="cameraPreview" autoplay playsinline></video>
      <canvas id="cameraCanvas" hidden></canvas>
    </section>

    <section id="inventorySection">
      <h2>Inventory</h2>
      <input type="text" id="searchInput" placeholder="Search items..." />
      <ul id="inventoryList"></ul>
    </section>
  </main>

  <div id="itemModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Add Item</h2>
      <label>Name <input type="text" id="itemName" /></label>
      <label>Quantity <input type="number" id="itemQty" min="0" /></label>
      <label>Category <input type="text" id="itemCategory" /></label>
      <label>Notes <textarea id="itemNotes"></textarea></label>
      <div class="modal-actions">
        <button id="saveItemBtn">Save</button>
        <button id="cancelItemBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="api.js"></script>
  <script src="camera.js"></script>
  <script src="excel.js"></script>
  <script src="app.js"></script>
</body>
</html>
